project:
  name: self-hosted-ai
  environment: dev

aws:
  region: us-east-1

instance:
  type: g6.xlarge
  spot: true
  disk_size_gb: 80

network:
  ssh_allowed_cidr:
    - 0.0.0.0/0

runtime:
  engine: vllm
  port: 8000

models:
  chat:
    source: qwen-chat
    parameters:
      dtype: auto
      gpu_memory_utilization: 0.90
      max_model_len: 8192

deployments:
  chat:
    runtime: vllm
    repository: Qwen/Qwen2.5-7B-Instruct
    default: true
    parameters:
      dtype: auto
      gpu_memory_utilization: 0.90
      max_model_len: 8192

  coder:
    runtime: vllm
    repository: deepseek-ai/DeepSeek-Coder
    parameters:
      dtype: auto
      gpu_memory_utilization: 0.90
      max_model_len: 8192

  reasoning:
    runtime: vllm
    repository: Qwen/QwQ
    parameters:
      dtype: auto
      gpu_memory_utilization: 0.90
      max_model_len: 8192

storage:
  download_dir: ./data/models

huggingface:
  token: ""

features:
  tool_calling:
    enabled: true
    parser: hermes

ui:
  enabled: true
  provider: open-webui

gateway:
  enabled: true
  port: 9000
  authentication:
    enabled: true
    api_key: auto

tls:
  enabled: false
  domain: ""

monitoring:
  enabled: false